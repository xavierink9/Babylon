# Spyglass Application Configuration
# This file stores configuration settings for the monitoring application

[Database]
# Database file path (relative to application directory)
db_path = spyglass.db

# Enable SQLCipher encryption (required for security)
enable_encryption = true

# SQLCipher encryption key (should be changed in production)
# Keep this secure - consider using environment variables
encryption_key = spyglass_default_key

[Monitoring]
# Keystroke logging enabled by default
keystroke_logging_enabled = true

# Application monitoring enabled by default
app_monitoring_enabled = true

# Screenshot interval in seconds (0 to disable)
screenshot_interval = 300


[Advanced]
# Aggressiveness level: low, high
aggressiveness_level = medium

# Maximum local storage in MB
max_storage_mb = 1000

# Enable debug logging
debug_logging = false

# Enable automatic backups
auto_backup_enabled = true

# Backup interval in hours
backup_interval = 24

[Security]
# Require admin privileges on startup
require_admin = true

# Hash password (sha256)
password_hash = 

# Session timeout in minutes (0 for no timeout)
session_timeout = 0

# Enable two-factor authentication
enable_2fa = false
